# ─────────────────────────────────────────────────────────────
#  Florissant Immobilier — full stack for a Hostinger VPS
#  App + PostgreSQL + automatic HTTPS (Caddy / Let's Encrypt).
#  Bring it up with:  docker compose up -d --build
# ─────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: florissant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: florissant
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florissant"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://florissant:${DB_PASSWORD}@db:5432/florissant
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:
